# Site settings
title: Orc Hwang's Wiki
description: >-
  개발 학습 기록과 기술 지식을 체계적으로 관리하는 개인 위키입니다.
baseurl: ""
url: "https://wiki.orchwang.dev"
author: Orc Hwang
email: your-email@example.com

lang: ko_KR
# Site-level social image (also feeds the SEO JSON-LD). The OG/Twitter meta is
# injected per-page via `defaults` below, because jekyll-seo-tag reads `image`
# from the page front matter, not from site config.
image:
  path: /assets/images/hero/orgrimmar-og.jpg
  width: 1200
  height: 630
  alt: "석양의 오그리마를 굽어보는 오크 전쟁군주 — Orc Hwang's Wiki"

# Career settings
career_start_date: 2015-04-01

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: text
permalink: /:year/:month/:day/:title.html
timezone: Asia/Seoul

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title.html

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Enable custom plugins from _plugins directory
plugins_dir: _plugins

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - specs/
  - CLAUDE.md
  - DESIGN.md
  - Makefile
  - .claude/

# Defaults
defaults:
  # Inject the social image + locale into EVERY page so jekyll-seo-tag
  # (which reads `image`/`locale` from page front matter, not site config)
  # emits og:image / og:image:width|height|alt / twitter:image as absolute URLs.
  # The core concept image: 석양의 오그리마를 굽어보는 오크 전쟁군주.
  # PER-POST OVERRIDE: add `image: /assets/images/...jpg` to a post's front matter
  # and it replaces this default for that page (page front matter beats defaults);
  # posts without `image` fall back to the global Orgrimmar OG below.
  - scope:
      path: ""
    values:
      locale: ko_KR
      image:
        path: /assets/images/hero/orgrimmar-og.jpg
        width: 1200
        height: 630
        alt: "석양의 오그리마를 굽어보는 오크 전쟁군주 — Orc Hwang's Wiki"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
  - scope:
      path: "pages"
    values:
      layout: "default"

# Tag settings
tag_page_layout: tag_page
tag_page_dir: tags

# Category settings
category_page_layout: category_page
category_page_dir: categories

# Series settings
series_page_layout: series_page
series_page_dir: series
