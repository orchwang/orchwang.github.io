<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="site-branding">
                <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="홈으로 — 전쟁군주의 문장">
                    <span class="warlord-crest">
                        <picture data-santa>
                            <source type="image/webp" srcset="{{ '/assets/images/avatar/front-orc.webp' | relative_url }}">
                            <img src="{{ '/assets/images/avatar/front-orc.png' | relative_url }}" alt="전쟁군주 — Orc Hwang" class="site-logo" width="56" height="56" decoding="async">
                        </picture>
                    </span>
                </a>
                <div class="branding-text">
                    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
                    <p class="site-description">{{ site.description }}</p>
                </div>
            </div>

            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" type="button"
                        aria-pressed="false" aria-label="테마 전환">
                    <span class="icon-light" aria-hidden="true">🔥</span><span class="toggle-label label-light">던전</span>
                    <span class="icon-dark" aria-hidden="true">☀️</span><span class="toggle-label label-dark">여관</span>
                </button>

                <button class="hamburger-menu" id="hamburger-menu" aria-label="Toggle navigation menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

            <nav class="main-navigation" id="main-navigation">
                <ul class="nav-menu">
                    <li><a href="{{ '/' | relative_url }}">홈</a></li>
                    <li><a href="{{ '/pages/categories.html' | relative_url }}">카테고리</a></li>
                    <li><a href="{{ '/pages/tags.html' | relative_url }}">태그</a></li>
                    <li><a href="{{ '/pages/series.html' | relative_url }}">시리즈</a></li>
                    <li><a href="{{ '/pages/cv.html' | relative_url }}">CV</a></li>
                </ul>
            </nav>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="검색어를 입력하세요...">
            <div id="search-results" class="search-results"></div>
        </div>
    </div>
</header>
