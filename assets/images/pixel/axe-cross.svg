<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges" role="img" aria-label="Crossed Gorehowl axes">
  <!-- ============================================================
       Two crossed Gorehowl axes — Horde war crest / section divider.
       Original pixel art on a 48x48 grid. Steel body + gold edge +
       crimson rune, mirrored. Used as masthead crest, section rule,
       and back-to-top sigil.
       ============================================================ -->
  <!-- LEFT axe (rotated so blade is top-left) -->
  <g transform="rotate(-45 24 24)">
    <!-- haft -->
    <rect x="22" y="8" width="4" height="34" fill="#3a2a1a"/>
    <rect x="21" y="16" width="6" height="2" fill="#3a2a1a"/>
    <rect x="21" y="26" width="6" height="2" fill="#3a2a1a"/>
    <rect x="21" y="36" width="6" height="2" fill="#3a2a1a"/>
    <!-- blade body -->
    <g fill="#5b5b62">
      <rect x="14" y="2" width="20" height="4"/>
      <rect x="13" y="6" width="22" height="4"/>
      <rect x="15" y="10" width="18" height="3"/>
    </g>
    <!-- back spike -->
    <rect x="23" y="0" width="2" height="3" fill="#5b5b62"/>
    <!-- gold edge -->
    <g fill="#c79a2e">
      <rect x="12" y="6" width="2" height="4"/>
      <rect x="34" y="6" width="2" height="4"/>
      <rect x="14" y="2" width="2" height="3"/>
      <rect x="32" y="2" width="2" height="3"/>
    </g>
    <!-- crimson rune -->
    <rect x="22" y="6" width="4" height="3" fill="#9e1a1a"/>
  </g>

  <!-- RIGHT axe (mirror) -->
  <g transform="rotate(45 24 24)">
    <rect x="22" y="8" width="4" height="34" fill="#3a2a1a"/>
    <rect x="21" y="16" width="6" height="2" fill="#3a2a1a"/>
    <rect x="21" y="26" width="6" height="2" fill="#3a2a1a"/>
    <rect x="21" y="36" width="6" height="2" fill="#3a2a1a"/>
    <g fill="#6a6a72">
      <rect x="14" y="2" width="20" height="4"/>
      <rect x="13" y="6" width="22" height="4"/>
      <rect x="15" y="10" width="18" height="3"/>
    </g>
    <rect x="23" y="0" width="2" height="3" fill="#6a6a72"/>
    <g fill="#d8a838">
      <rect x="12" y="6" width="2" height="4"/>
      <rect x="34" y="6" width="2" height="4"/>
      <rect x="14" y="2" width="2" height="3"/>
      <rect x="32" y="2" width="2" height="3"/>
    </g>
    <rect x="22" y="6" width="4" height="3" fill="#9e1a1a"/>
  </g>
</svg>
